<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Football Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>

/* ─── RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #06090a;
  --surface:   #0b0f10;
  --card:      #0e1315;
  --card-hov:  #111618;
  --border:    #1a2124;
  --border-hov:#253035;
  --ink:       #dde8ec;
  --ink-mid:   #7a9aaa;
  --ink-dim:   #3a5060;
  --ink-faint: #141e22;
  --accent:    #00d4ff;
  --accent-g:  rgba(0,212,255,.18);
  --accent-2:  #ff3d5a;
  --accent-2g: rgba(255,61,90,.15);
  --gold:      #f5c842;
  --gold-g:    rgba(245,200,66,.18);
  --r:         8px;
  --font-head: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}
html { background: var(--bg); color: var(--ink); font-family: var(--font-body); scroll-behavior: smooth; }
body { min-height: 100vh; }
a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
img { display: block; max-width: 100%; }

/* ─── PAGE WRAPPER ─────────────────────────────────────────── */
.fb-page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* ─── MASTHEAD ─────────────────────────────────────────────── */
.fb-masthead {
  padding: 0;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.fb-masthead-inner {
  max-width: 1280px; margin: 0 auto; padding: 0 20px;
  display: flex; align-items: stretch; gap: 0;
  height: 56px;
}
/* rainbow bar */
.fb-masthead::before {
  content: ''; display: block; height: 3px;
  background: linear-gradient(90deg,
    var(--accent) 0%, #7b61ff 33%, var(--accent-2) 66%, var(--gold) 100%);
}

/* logo */
.fb-logo {
  display: flex; align-items: center; gap: 10px;
  padding-right: 24px;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}
.fb-logo-icon {
  width: 30px; height: 30px; border-radius: 50%;
  background: conic-gradient(var(--accent) 0deg 60deg, var(--surface) 60deg 120deg,
    var(--accent) 120deg 180deg, var(--surface) 180deg 240deg,
    var(--accent) 240deg 300deg, var(--surface) 300deg 360deg);
  box-shadow: 0 0 14px var(--accent-g);
  position: relative; flex-shrink: 0;
}
.fb-logo-icon::after {
  content: ''; position: absolute; inset: 4px;
  border-radius: 50%; background: var(--surface);
  border: 2px solid rgba(0,212,255,.25);
}
.fb-logo-text {
  font-family: var(--font-head);
  font-size: 20px; font-weight: 800;
  letter-spacing: .06em; text-transform: uppercase;
  color: var(--ink); line-height: 1;
}
.fb-logo-text span { color: var(--accent); }

/* nav tabs */
.fb-nav-tabs {
  display: flex; align-items: stretch;
  gap: 0; flex: 1;
  overflow-x: auto; scrollbar-width: none;
  padding: 0 6px;
}
.fb-nav-tabs::-webkit-scrollbar { display: none; }
.fb-nav-tab {
  height: 100%; padding: 0 14px;
  display: flex; align-items: center;
  font-family: var(--font-head);
  font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-dim); white-space: nowrap;
  position: relative; transition: color .18s;
  flex-shrink: 0;
}
.fb-nav-tab::after {
  content: ''; position: absolute; bottom: 0;
  left: 50%; right: 50%; height: 2px;
  background: var(--accent);
  transition: left .2s, right .2s;
  border-radius: 2px 2px 0 0;
}
.fb-nav-tab:hover { color: var(--ink-mid); }
.fb-nav-tab.active { color: var(--accent); }
.fb-nav-tab.active::after { left: 6px; right: 6px; box-shadow: 0 0 8px var(--accent-g); }

/* stats pill */
.fb-masthead-right {
  display: flex; align-items: center;
  padding-left: 16px; border-left: 1px solid var(--border);
  flex-shrink: 0;
}
.fb-count-pill {
  font-family: var(--font-head);
  font-size: 11px; font-weight: 700;
  letter-spacing: .08em;
  padding: 4px 12px; border-radius: 20px;
  background: var(--accent-g);
  border: 1px solid rgba(0,212,255,.2);
  color: var(--accent);
}

/* ─── HERO SECTION ─────────────────────────────────────────── */
.fb-hero {
  padding: 32px 0 24px;
  display: flex; align-items: flex-end;
  justify-content: space-between; gap: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}
.fb-hero-label {
  font-family: var(--font-head);
  font-size: 11px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 6px;
  display: flex; align-items: center; gap: 7px;
}
.fb-hero-label::before {
  content: ''; width: 18px; height: 2px; background: var(--accent);
  border-radius: 2px;
}
.fb-hero-title {
  font-family: var(--font-head);
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 800; line-height: .95;
  letter-spacing: -.01em; text-transform: uppercase;
  color: var(--ink);
}
.fb-hero-title span { color: var(--accent); }
.fb-hero-sub {
  font-size: 13px; color: var(--ink-mid);
  margin-top: 8px; font-weight: 300; line-height: 1.5;
}
.fb-search-wrap {
  position: relative; flex-shrink: 0;
}
.fb-search {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 9px 14px 9px 38px;
  color: var(--ink); font-family: var(--font-body);
  font-size: 13px; width: 220px;
  transition: border-color .18s, box-shadow .18s;
  outline: none;
}
.fb-search::placeholder { color: var(--ink-dim); }
.fb-search:focus {
  border-color: rgba(0,212,255,.35);
  box-shadow: 0 0 0 3px rgba(0,212,255,.07);
}
.fb-search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--ink-dim); pointer-events: none;
}

/* ─── FILTER BAR ───────────────────────────────────────────── */
.fb-filter-bar {
  display: flex; align-items: center;
  gap: 8px; flex-wrap: wrap;
  margin-bottom: 24px;
}
.fb-filter-bar-label {
  font-family: var(--font-head); font-size: 10px;
  font-weight: 700; letter-spacing: .15em;
  text-transform: uppercase; color: var(--ink-dim);
  margin-right: 4px;
}
.fb-chip {
  padding: 5px 14px; border-radius: 4px;
  font-family: var(--font-head); font-size: 10px;
  font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--ink-dim);
  transition: all .18s;
}
.fb-chip:hover { color: var(--ink-mid); border-color: var(--border-hov); }
.fb-chip.active {
  background: var(--accent-g);
  border-color: rgba(0,212,255,.3);
  color: var(--accent);
  box-shadow: 0 2px 10px rgba(0,212,255,.1);
}

/* ─── GRID LAYOUT ──────────────────────────────────────────── */
.fb-grid-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.fb-section-label {
  font-family: var(--font-head);
  font-size: 12px; font-weight: 700;
  letter-spacing: .15em; text-transform: uppercase;
  color: var(--ink-mid);
  display: flex; align-items: center; gap: 8px;
}
.fb-section-label::before {
  content: ''; width: 3px; height: 14px;
  background: var(--accent); border-radius: 2px;
  box-shadow: 0 0 6px var(--accent-g);
}
.fb-sort {
  display: flex; align-items: center; gap: 6px;
}
.fb-sort-label {
  font-size: 11px; color: var(--ink-dim); font-weight: 300;
}
.fb-sort-select {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 10px;
  color: var(--ink-mid); font-size: 11px;
  font-family: var(--font-body); outline: none;
  cursor: pointer;
}

.fb-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
@media (max-width: 900px) { .fb-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .fb-grid { grid-template-columns: 1fr; } }

/* ─── FEATURED (first card spans 2 cols on large) ───────────── */
.fb-card-feat {
  grid-column: span 2;
}
@media (max-width: 900px) { .fb-card-feat { grid-column: span 2; } }
@media (max-width: 560px) { .fb-card-feat { grid-column: span 1; } }

/* ─── CARD ─────────────────────────────────────────────────── */
.fb-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  display: flex; flex-direction: column;
  position: relative;
  transition: transform .22s, box-shadow .22s, border-color .22s;
  animation: fb-fade-up .4s ease both;
}
.fb-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 50px rgba(0,0,0,.6), 0 0 0 1px rgba(0,212,255,.12);
  border-color: var(--border-hov);
}
@keyframes fb-fade-up {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* stagger */
.fb-card:nth-child(1)  { animation-delay: .04s; }
.fb-card:nth-child(2)  { animation-delay: .08s; }
.fb-card:nth-child(3)  { animation-delay: .12s; }
.fb-card:nth-child(4)  { animation-delay: .16s; }
.fb-card:nth-child(5)  { animation-delay: .20s; }
.fb-card:nth-child(6)  { animation-delay: .24s; }
.fb-card:nth-child(7)  { animation-delay: .28s; }
.fb-card:nth-child(8)  { animation-delay: .32s; }
.fb-card:nth-child(9)  { animation-delay: .36s; }

/* thumbnail */
.fb-card-img {
  position: relative; overflow: hidden;
  width: 100%; height: 188px; flex-shrink: 0;
  background: var(--ink-faint);
}
.fb-card-feat .fb-card-img { height: 280px; }
.fb-card-img img {
  width: 100%; height: 100%; object-fit: cover;
  opacity: .85; transition: transform .55s ease, opacity .22s;
}
.fb-card:hover .fb-card-img img { transform: scale(1.06); opacity: .95; }
.fb-card-img-fallback {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; color: var(--ink-faint);
  background: linear-gradient(145deg, #0b0f10, #06090a);
}

/* league ribbon */
.fb-ribbon {
  position: absolute; top: 12px; left: 0;
  font-family: var(--font-head);
  font-size: 9px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase;
  padding: 3px 10px 3px 10px;
  background: var(--accent);
  color: #000;
  border-radius: 0 3px 3px 0;
  box-shadow: 3px 3px 10px rgba(0,0,0,.5);
  z-index: 2;
}
/* custom ribbon colors per league */
.fb-ribbon[data-l="EPL"]   { background:#37003c; color:#00ff85; }
.fb-ribbon[data-l="ITA"]   { background:#0066b2; color:#fff; }
.fb-ribbon[data-l="ESP"]   { background:#c60b1e; color:#ffc400; }
.fb-ribbon[data-l="GER"]   { background:#d4021d; color:#fff; }
.fb-ribbon[data-l="L1"]    { background:#091c3e; color:#da291c; }
.fb-ribbon[data-l="UCL"]   { background:#1a1aff; color:#fff; }
.fb-ribbon[data-l="SPL"]   { background:#00732f; color:#fff; }
.fb-ribbon[data-l="CHAMP"] { background:#ff4f1a; color:#fff; }
.fb-ribbon[data-l="TUR"]   { background:#e30a17; color:#fff; }

/* read time badge */
.fb-img-badge {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(6,9,10,.85); backdrop-filter: blur(4px);
  border: 1px solid var(--border);
  border-radius: 4px; padding: 3px 8px;
  font-family: var(--font-head);
  font-size: 9px; font-weight: 700; letter-spacing: .1em;
  color: var(--ink-mid); text-transform: uppercase;
  display: flex; align-items: center; gap: 4px;
}
.fb-img-badge::before { content: '▶'; font-size: 7px; color: var(--accent); }

/* hover play overlay */
.fb-play-ov {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.45); opacity: 0;
  transition: opacity .2s;
}
.fb-card:hover .fb-play-ov { opacity: 1; }
.fb-play-ring {
  width: 50px; height: 50px; border-radius: 50%;
  border: 2px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,212,255,.12);
  box-shadow: 0 0 24px var(--accent-g);
  transform: scale(.85); transition: transform .2s;
}
.fb-card:hover .fb-play-ring { transform: scale(1); }

/* body */
.fb-card-body {
  padding: 14px 16px 16px;
  display: flex; flex-direction: column; flex: 1;
}
.fb-card-meta {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.fb-card-date {
  font-size: 10px; color: var(--ink-dim); font-weight: 400;
  font-family: var(--font-head); letter-spacing: .06em;
}
.fb-card-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-faint); }
.fb-card-league-tag {
  font-family: var(--font-head); font-size: 9px;
  font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-dim);
}

.fb-card-title {
  font-family: var(--font-head);
  font-size: 17px; font-weight: 700;
  line-height: 1.2; letter-spacing: .01em;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  transition: color .18s; flex: 1;
}
.fb-card:hover .fb-card-title { color: var(--accent); }
.fb-card-feat .fb-card-title { font-size: 22px; -webkit-line-clamp: 4; }

.fb-card-foot {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-top: 14px; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.fb-read-link {
  font-family: var(--font-head); font-size: 10px;
  font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--accent);
  display: flex; align-items: center; gap: 5px;
  transition: gap .18s;
}
.fb-read-link::after { content: '→'; }
.fb-card:hover .fb-read-link { gap: 9px; }
.fb-share-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--border); display: flex;
  align-items: center; justify-content: center;
  color: var(--ink-dim); transition: all .18s;
}
.fb-share-btn:hover { background: var(--accent-g); color: var(--accent); }

/* ─── LOADING / EMPTY STATES ───────────────────────────────── */
.fb-loading {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: center;
  gap: 12px; padding: 60px 0;
  color: var(--ink-dim); font-size: 13px;
}
.fb-spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.fb-empty {
  grid-column: 1 / -1; padding: 60px 0;
  text-align: center; color: var(--ink-dim);
}
.fb-empty-icon { font-size: 40px; margin-bottom: 12px; }
.fb-empty-text { font-family: var(--font-head); font-size: 14px; letter-spacing: .1em; }

/* skeleton */
.fb-skel {
  border-radius: var(--r); overflow: hidden;
  border: 1px solid var(--border);
}
.fb-skel-img {
  width: 100%; height: 188px;
  background: var(--card);
  animation: fb-shimmer 1.4s ease infinite;
}
.fb-skel-body { padding: 14px 16px; }
.fb-skel-line {
  height: 10px; border-radius: 4px;
  background: var(--card);
  margin-bottom: 8px;
  animation: fb-shimmer 1.4s ease infinite;
}
.fb-skel-line.short { width: 60%; }
@keyframes fb-shimmer {
  0%,100% { opacity: .35; } 50% { opacity: .7; }
}

/* ─── LOAD MORE ────────────────────────────────────────────── */
.fb-load-more-wrap {
  margin-top: 36px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
.fb-load-more {
  padding: 12px 36px; border-radius: 6px;
  border: 1px solid rgba(0,212,255,.3);
  background: var(--accent-g);
  color: var(--accent);
  font-family: var(--font-head); font-size: 12px;
  font-weight: 700; letter-spacing: .15em;
  text-transform: uppercase;
  transition: all .22s; display: flex; align-items: center; gap: 8px;
}
.fb-load-more:hover {
  background: rgba(0,212,255,.28);
  box-shadow: 0 0 24px rgba(0,212,255,.15);
}
.fb-load-more:disabled {
  opacity: .4; cursor: not-allowed;
}
.fb-load-progress {
  font-size: 11px; color: var(--ink-dim);
  font-family: var(--font-head); letter-spacing: .08em;
}
.fb-progress-bar {
  width: 180px; height: 2px;
  background: var(--border); border-radius: 2px; overflow: hidden;
}
.fb-progress-fill {
  height: 100%; background: var(--accent);
  border-radius: 2px; transition: width .3s;
  box-shadow: 0 0 6px var(--accent-g);
}

/* ─── DIVIDER ──────────────────────────────────────────────── */
.fb-divider {
  height: 1px; background: var(--border);
  margin: 32px 0;
  position: relative;
}
.fb-divider::after {
  content: '●'; position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg); padding: 0 10px;
  color: var(--ink-faint); font-size: 8px; letter-spacing: 6px;
}

/* ─── FOOTER ───────────────────────────────────────────────── */
.fb-page-footer {
  border-top: 1px solid var(--border);
  padding: 18px 20px;
  max-width: 1280px; margin: 0 auto;
  display: flex; align-items: center;
  justify-content: space-between; gap: 12px;
  flex-wrap: wrap;
}
.fb-footer-brand {
  font-family: var(--font-head); font-size: 13px;
  font-weight: 800; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink-mid);
}
.fb-footer-brand span { color: var(--accent); }
.fb-footer-note {
  font-size: 11px; color: var(--ink-dim); font-weight: 300;
}

/* ─── RESPONSIVE ───────────────────────────────────────────── */
@media (max-width: 768px) {
  .fb-hero { flex-direction: column; align-items: flex-start; }
  .fb-search-wrap { display: none; }
  .fb-masthead-right { display: none; }
}
@media (max-width: 500px) {
  .fb-logo-text { font-size: 16px; }
  .fb-nav-tabs { display: none; }
  .fb-filter-bar { gap: 6px; }
  .fb-chip { padding: 5px 10px; font-size: 9px; }
}

</style>
</head>

<!-- ═══════════ STICKY MASTHEAD ═══════════ -->
<header class="fb-masthead">
  <div class="fb-masthead-inner">
    <div class="fb-logo">
      <div class="fb-logo-icon"></div>
      <span class="fb-logo-text">Foot<span>ball</span></span>
    </div>
    <nav class="fb-nav-tabs" id="fbNavTabs">
      <button class="fb-nav-tab active" data-label="All" onclick="fbFilter('All')">All Matches</button>
      <button class="fb-nav-tab" data-label="Premier League" onclick="fbFilter('Premier League')">Premier League</button>
      <button class="fb-nav-tab" data-label="Champions League" onclick="fbFilter('Champions League')">Champions League</button>
      <button class="fb-nav-tab" data-label="La Liga" onclick="fbFilter('La Liga')">La Liga</button>
      <button class="fb-nav-tab" data-label="Serie A" onclick="fbFilter('Serie A')">Serie A</button>
      <button class="fb-nav-tab" data-label="Bundesliga" onclick="fbFilter('Bundesliga')">Bundesliga</button>
      <button class="fb-nav-tab" data-label="French League" onclick="fbFilter('French League')">Ligue 1</button>

            <button class="fb-nav-tab" data-label="World Cup" onclick="fbFilter('Football')">World Cup</button>

    </nav>
    <div class="fb-masthead-right">
      <span class="fb-count-pill" id="fbCountPill">Loading…</span>
    </div>
  </div>
</header>

<!-- ═══════════ PAGE CONTENT ═══════════ -->
<div class="fb-page">

  <!-- Hero -->
  <div class="fb-hero">
    <div>
      <div class="fb-hero-label">Live &amp; Latest</div>
      <div class="fb-hero-title">Football<br><span>Coverage</span></div>
      <div class="fb-hero-sub">Stream highlights, match reports &amp; news across all major leagues.</div>
    </div>
    <div class="fb-search-wrap">
      <svg class="fb-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="fb-search" type="text" id="fbSearch" placeholder="Search posts…" oninput="fbSearchFilter()" autocomplete="off" />
    </div>
  </div>

  <!-- Filter chips (mobile-friendly duplicate) -->
  <div class="fb-filter-bar" id="fbFilterBar">
    <span class="fb-filter-bar-label">Filter:</span>
    <button class="fb-chip active" data-label="All" onclick="fbFilter('All')">All</button>
    <button class="fb-chip" data-label="Premier League" onclick="fbFilter('Premier League')">EPL</button>
    <button class="fb-chip" data-label="Champions League" onclick="fbFilter('Champions League')">UCL</button>
    <button class="fb-chip" data-label="La Liga" onclick="fbFilter('La Liga')">La Liga</button>
    <button class="fb-chip" data-label="Serie A" onclick="fbFilter('Serie A')">Serie A</button>
    <button class="fb-chip" data-label="Bundesliga" onclick="fbFilter('Bundesliga')">Bundesliga</button>
    <button class="fb-chip" data-label="French League" onclick="fbFilter('French League')">Ligue 1</button>
    <button class="fb-chip" data-label="Saudi Pro League" onclick="fbFilter('Saudi Pro League')">Saudi</button>
    <button class="fb-chip" data-label="Championship" onclick="fbFilter('Championship')">Championship</button>
    <button class="fb-chip" data-label="Turkey" onclick="fbFilter('Turkey')">Süper Lig</button>
  </div>

  <!-- Grid header -->
  <div class="fb-grid-header">
    <div class="fb-section-label" id="fbSectionLabel">All Posts</div>
    <div class="fb-sort">
      <span class="fb-sort-label">Sort:</span>
      <select class="fb-sort-select" id="fbSortSelect" onchange="fbSort()">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>

  <div class="fb-grid" id="fbSkeletons">

    <div class="fb-skel"><div class="fb-skel-img"></div><div class="fb-skel-body"><div class="fb-skel-line short"></div><div class="fb-skel-line"></div></div></div>
    <div class="fb-skel"><div class="fb-skel-img"></div><div class="fb-skel-body"><div class="fb-skel-line short"></div><div class="fb-skel-line"></div></div></div>
    <div class="fb-skel"><div class="fb-skel-img"></div><div class="fb-skel-body"><div class="fb-skel-line short"></div><div class="fb-skel-line"></div></div></div>
    <div class="fb-skel"><div class="fb-skel-img"></div><div class="fb-skel-body"><div class="fb-skel-line short"></div><div class="fb-skel-line"></div></div></div>
    <div class="fb-skel"><div class="fb-skel-img"></div><div class="fb-skel-body"><div class="fb-skel-line short"></div><div class="fb-skel-line"></div></div></div>

  <div class="fb-load-more-wrap" id="fbLoadMoreWrap" style="display:none">

</footer>

<!-- ═══════════ SCRIPT ═══════════ -->
<script>
(function () {

  /* ── CONFIG ── Change blogUrl to your Blogger site ── */
  var CONFIG = {
    blogUrl: 'https://sports803livestream.blogspot.com',
    labels: [
      { label: 'Premier League',   short: 'EPL',   maxResults: 8  },
      { label: 'Serie A',          short: 'ITA',   maxResults: 7  },
      { label: 'Saudi Pro League', short: 'SPL',   maxResults: 6  },
      { label: 'La Liga',          short: 'ESP',   maxResults: 7  },
      { label: 'French League',    short: 'L1',    maxResults: 6  },
      { label: 'Championship',     short: 'CHAMP', maxResults: 5  },
      { label: 'Bundesliga',       short: 'GER',   maxResults: 7  },
      { label: 'Champions League', short: 'UCL',   maxResults: 8  },
      { label: 'Turkey',           short: 'TUR',   maxResults: 5  },
    ],
    pageSize: 9,   /* cards per page */
    maxTotal: 80,
  };

  var ALL = [], FILTERED = [], SORTED = [], cur = 0;
  var activeLabel = 'All', sortMode = 'date-desc', searchQ = '';

  var SHORTS = {};
  CONFIG.labels.forEach(function (c) { SHORTS[c.label] = c.short; });

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(d) {
    if (!d) return '';
    var dt = new Date(d);
    return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  /* ── fetch one label ── */
  function fetchLabel(cfg) {
    var url = cfg.blogUrl + '/feeds/posts/default/-/' +
      encodeURIComponent(cfg.label) + '?alt=json&max-results=' + (cfg.maxResults || 6);
    return fetch(url)
      .then(function (r) { return r.json(); })
      .then(function (json) {
        var entries = (json.feed && json.feed.entry) ? json.feed.entry : [];
        return entries.map(function (e) {
          var link = '';
          (e.link || []).forEach(function (l) { if (l.rel === 'alternate') link = l.href; });
          var img = null;
          if (e.media$thumbnail) {
            img = e.media$thumbnail.url.replace(/\/s\d+-c\//,'/s600-c/');
          } else if (e.content && e.content.$t) {
            var m = e.content.$t.match(/<img[^>]+src=["']([^"']+)["']/i);
            if (m) img = m[1];
          }
          return {
            title: e.title.$t,
            image: img,
            link: link,
            label: cfg.label,
            short: SHORTS[cfg.label] || cfg.label,
            date: e.published ? e.published.$t.slice(0, 10) : ''
          };
        });
      }).catch(function () { return []; });
  }

  /* ── load everything ── */
  function loadAll() {
    Promise.all(CONFIG.labels.map(function (c) {
      return fetchLabel({ blogUrl: CONFIG.blogUrl, label: c.label, maxResults: c.maxResults });
    })).then(function (results) {
      var all = [], seen = {};
      results.forEach(function (a) { all = all.concat(a); });
      all = all.filter(function (p) {
        if (!p.link || seen[p.link]) return false;
        seen[p.link] = true;
        return true;
      });
      all.sort(function (a, b) { return b.date.localeCompare(a.date); });
      if (CONFIG.maxTotal > 0) all = all.slice(0, CONFIG.maxTotal);
      ALL = all;

      /* hide skeletons */
      document.getElementById('fbSkeletons').style.display = 'none';
      document.getElementById('fbGrid').style.display = 'grid';

      applyFilter('All');
    });
  }

  /* ── filter ── */
  function applyFilter(label) {
    activeLabel = label; searchQ = ''; cur = 0;
    var si = document.getElementById('fbSearch');
    if (si) si.value = '';

    /* update tabs + chips */
    document.querySelectorAll('.fb-nav-tab').forEach(function (t) {
      t.classList.toggle('active', t.dataset.label === label);
    });
    document.querySelectorAll('.fb-chip').forEach(function (t) {
      t.classList.toggle('active', t.dataset.label === label);
    });

    var label2 = label === 'All' ? 'All Posts' : label;
    document.getElementById('fbSectionLabel').textContent = label2;

    FILTERED = label === 'All' ? ALL.slice() : ALL.filter(function (p) { return p.label === label; });
    applySort();
  }

  /* ── sort ── */
  function applySort() {
    SORTED = FILTERED.slice();
    if (sortMode === 'date-desc') SORTED.sort(function (a, b) { return b.date.localeCompare(a.date); });
    else if (sortMode === 'date-asc') SORTED.sort(function (a, b) { return a.date.localeCompare(b.date); });
    else if (sortMode === 'alpha') SORTED.sort(function (a, b) { return a.title.localeCompare(b.title); });
    applySearch();
  }

  /* ── search ── */
  function applySearch() {
    var q = searchQ.toLowerCase().trim();
    var results = q ? SORTED.filter(function (p) {
      return p.title.toLowerCase().includes(q) || p.label.toLowerCase().includes(q);
    }) : SORTED;
    cur = 0;
    renderPage(results);
  }

  /* ── render ── */
  function renderPage(data) {
    var grid = document.getElementById('fbGrid');
    var page = data.slice(0, CONFIG.pageSize);
    grid.innerHTML = page.length === 0
      ? '<div class="fb-empty"><div class="fb-empty-icon">🏟</div><div class="fb-empty-text">No posts found.</div></div>'
      : page.map(function (d, i) { return cardHtml(d, i === 0); }).join('');

    /* store full data set for load-more */
    grid._allData = data;
    grid._shown = page.length;

    updateCounter(data.length);
    updateLoadMore(grid._shown, data.length);
  }

  function cardHtml(d, featured) {
    var sh = d.short || SHORTS[d.label] || d.label;
    var imgH = d.image
      ? '<img src="' + esc(d.image) + '" alt="' + esc(d.title) + '" draggable="false" loading="lazy" onerror="this.onerror=null;this.closest(\'.fb-card-img\').innerHTML=\'<div class=\\\'fb-card-img-fallback\\\'>⚽</div>\'">'
      : '<div class="fb-card-img-fallback">⚽</div>';
    return '<a href="' + esc(d.link) + '" class="fb-card' + (featured ? ' fb-card-feat' : '') + '" target="_blank">' +
      '<div class="fb-card-img">' +
        '<div class="fb-ribbon" data-l="' + esc(sh) + '">' + esc(sh) + '</div>' +
        imgH +
        '<div class="fb-img-badge">Watch</div>' +
        '<div class="fb-play-ov"><div class="fb-play-ring">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="6 3 20 12 6 21 6 3"/></svg>' +
        '</div></div>' +
      '</div>' +
      '<div class="fb-card-body">' +
        '<div class="fb-card-meta">' +
          '<span class="fb-card-date">' + fmtDate(d.date) + '</span>' +
          '<span class="fb-card-dot"></span>' +
          '<span class="fb-card-league-tag">' + esc(d.label) + '</span>' +
        '</div>' +
        '<div class="fb-card-title">' + esc(d.title) + '</div>' +
        '<div class="fb-card-foot">' +
          '<span class="fb-read-link">Read more</span>' +
          '<button class="fb-share-btn" onclick="fbShare(event,\'' + esc(d.link) + '\',\'' + esc(d.title) + '\')">' +
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>' +
          '</button>' +
        '</div>' +
      '</div>' +
    '</a>';
  }

  /* ── load more ── */
  function loadMore() {
    var grid = document.getElementById('fbGrid');
    var data = grid._allData || [];
    var shown = grid._shown || 0;
    var next = data.slice(shown, shown + CONFIG.pageSize);
    if (!next.length) return;
    next.forEach(function (d) {
      var div = document.createElement('div');
      div.innerHTML = cardHtml(d, false);
      var card = div.firstChild;
      card.style.animationDelay = '0s';
      grid.appendChild(card);
    });
    grid._shown = shown + next.length;
    updateLoadMore(grid._shown, data.length);
  }

  function updateLoadMore(shown, total) {
    var wrap = document.getElementById('fbLoadMoreWrap');
    var btn  = document.getElementById('fbLoadMoreBtn');
    var prog = document.getElementById('fbLoadProgress');
    var fill = document.getElementById('fbProgressFill');
    if (total === 0) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'flex';
    prog.textContent = shown + ' of ' + total + ' posts shown';
    fill.style.width = Math.min(100, (shown / total * 100)).toFixed(1) + '%';
    btn.style.display = shown >= total ? 'none' : '';
    btn.disabled = shown >= total;
  }

  function updateCounter(n) {
    var el = document.getElementById('fbCountPill');
    if (el) el.textContent = n + ' post' + (n !== 1 ? 's' : '');
  }

  /* ── share ── */
  function share(e, url, title) {
    e.preventDefault(); e.stopPropagation();
    if (navigator.share) { navigator.share({ title: title, url: url }); }
    else { navigator.clipboard && navigator.clipboard.writeText(url); }
  }

  /* ── expose globals ── */
  window.fbFilter   = applyFilter;
  window.fbSort     = function () { sortMode = document.getElementById('fbSortSelect').value; applySort(); };
  window.fbLoadMore = loadMore;
  window.fbShare    = share;
  window.fbSearchFilter = function () {
    searchQ = (document.getElementById('fbSearch').value || '');
    applySearch();
  };

  /* ── boot ── */
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', loadAll);
  else loadAll();

})();
</script>
</body>
