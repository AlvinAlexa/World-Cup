<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Football Hub | Live Match Coverage & Highlights</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>

/* ---------- RESET & GLOBAL ---------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #06090a;
  --surface:   #0b0f10;
  --card:      #0e1315;
  --card-hov:  #111618;
  --border:    #1a2124;
  --border-hov:#253035;
  --ink:       #dde8ec;
  --ink-mid:   #7a9aaa;
  --ink-dim:   #3a5060;
  --ink-faint: #141e22;
  --accent:    #00d4ff;
  --accent-g:  rgba(0,212,255,.18);
  --accent-2:  #ff3d5a;
  --gold:      #f5c842;
  --r:         8px;
  --font-head: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
}
html { background: var(--bg); color: var(--ink); font-family: var(--font-body); scroll-behavior: smooth; }
body { min-height: 100vh; background: var(--bg); }
a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
img { display: block; max-width: 100%; }

/* ---------- PAGE WRAPPER ---------- */
.fb-page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* ---------- STICKY MASTHEAD ---------- */
.fb-masthead {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.fb-masthead-inner {
  max-width: 1280px; margin: 0 auto; padding: 0 20px;
  display: flex; align-items: stretch; gap: 0;
  height: 56px;
}
.fb-masthead::before {
  content: ''; display: block; height: 3px;
  background: linear-gradient(90deg, var(--accent) 0%, #7b61ff 33%, var(--accent-2) 66%, var(--gold) 100%);
}
.fb-logo {
  display: flex; align-items: center; gap: 10px;
  padding-right: 24px;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}
.fb-logo-icon {
  width: 30px; height: 30px; border-radius: 50%;
  background: conic-gradient(var(--accent) 0deg 60deg, var(--surface) 60deg 120deg,
    var(--accent) 120deg 180deg, var(--surface) 180deg 240deg,
    var(--accent) 240deg 300deg, var(--surface) 300deg 360deg);
  box-shadow: 0 0 14px var(--accent-g);
  position: relative; flex-shrink: 0;
}
.fb-logo-icon::after {
  content: ''; position: absolute; inset: 4px;
  border-radius: 50%; background: var(--surface);
  border: 2px solid rgba(0,212,255,.25);
}
.fb-logo-text {
  font-family: var(--font-head);
  font-size: 20px; font-weight: 800;
  letter-spacing: .06em; text-transform: uppercase;
  color: var(--ink); line-height: 1;
}
.fb-logo-text span { color: var(--accent); }

/* dynamic nav tabs (auto-generated) */
.fb-nav-tabs {
  display: flex; align-items: stretch;
  gap: 0; flex: 1;
  overflow-x: auto; scrollbar-width: none;
  padding: 0 6px;
}
.fb-nav-tabs::-webkit-scrollbar { display: none; }
.fb-nav-tab {
  height: 100%; padding: 0 14px;
  display: flex; align-items: center;
  font-family: var(--font-head);
  font-size: 11px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-dim); white-space: nowrap;
  position: relative; transition: color .18s;
  flex-shrink: 0;
}
.fb-nav-tab::after {
  content: ''; position: absolute; bottom: 0;
  left: 50%; right: 50%; height: 2px;
  background: var(--accent);
  transition: left .2s, right .2s;
  border-radius: 2px;
}
.fb-nav-tab:hover { color: var(--ink-mid); }
.fb-nav-tab.active { color: var(--accent); }
.fb-nav-tab.active::after { left: 6px; right: 6px; box-shadow: 0 0 8px var(--accent-g); }

.fb-masthead-right {
  display: flex; align-items: center;
  padding-left: 16px; border-left: 1px solid var(--border);
  flex-shrink: 0;
}
.fb-count-pill {
  font-family: var(--font-head);
  font-size: 11px; font-weight: 700;
  letter-spacing: .08em;
  padding: 4px 12px; border-radius: 20px;
  background: var(--accent-g);
  border: 1px solid rgba(0,212,255,.2);
  color: var(--accent);
}

/* ---------- HERO SECTION ---------- */
.fb-hero {
  padding: 32px 0 24px;
  display: flex; align-items: flex-end;
  justify-content: space-between; gap: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}
.fb-hero-label {
  font-family: var(--font-head);
  font-size: 11px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 6px;
  display: flex; align-items: center; gap: 7px;
}
.fb-hero-label::before {
  content: ''; width: 18px; height: 2px; background: var(--accent);
  border-radius: 2px;
}
.fb-hero-title {
  font-family: var(--font-head);
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 800; line-height: .95;
  letter-spacing: -.01em; text-transform: uppercase;
}
.fb-hero-title span { color: var(--accent); }
.fb-hero-sub {
  font-size: 13px; color: var(--ink-mid);
  margin-top: 8px; font-weight: 300; line-height: 1.5;
}
.fb-search-wrap {
  position: relative; flex-shrink: 0;
}
.fb-search {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 9px 14px 9px 38px;
  color: var(--ink); font-family: var(--font-body);
  font-size: 13px; width: 220px;
  transition: border-color .18s, box-shadow .18s;
  outline: none;
}
.fb-search::placeholder { color: var(--ink-dim); }
.fb-search:focus {
  border-color: rgba(0,212,255,.35);
  box-shadow: 0 0 0 3px rgba(0,212,255,.07);
}
.fb-search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--ink-dim); pointer-events: none;
}

/* ---------- FILTER CHIPS (auto) ---------- */
.fb-filter-bar {
  display: flex; align-items: center;
  gap: 8px; flex-wrap: wrap;
  margin-bottom: 24px;
}
.fb-filter-bar-label {
  font-family: var(--font-head); font-size: 10px;
  font-weight: 700; letter-spacing: .15em;
  text-transform: uppercase; color: var(--ink-dim);
  margin-right: 4px;
}
.fb-chip {
  padding: 5px 14px; border-radius: 4px;
  font-family: var(--font-head); font-size: 10px;
  font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--ink-dim);
  transition: all .18s;
}
.fb-chip:hover { color: var(--ink-mid); border-color: var(--border-hov); }
.fb-chip.active {
  background: var(--accent-g);
  border-color: rgba(0,212,255,.3);
  color: var(--accent);
  box-shadow: 0 2px 10px rgba(0,212,255,.1);
}

/* ---------- GRID LAYOUT ---------- */
.fb-grid-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.fb-section-label {
  font-family: var(--font-head);
  font-size: 12px; font-weight: 700;
  letter-spacing: .15em; text-transform: uppercase;
  color: var(--ink-mid);
  display: flex; align-items: center; gap: 8px;
}
.fb-section-label::before {
  content: ''; width: 3px; height: 14px;
  background: var(--accent); border-radius: 2px;
}
.fb-sort {
  display: flex; align-items: center; gap: 6px;
}
.fb-sort-label {
  font-size: 11px; color: var(--ink-dim); font-weight: 300;
}
.fb-sort-select {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 10px;
  color: var(--ink-mid); font-size: 11px;
  font-family: var(--font-body); outline: none;
  cursor: pointer;
}

.fb-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
@media (max-width: 900px) { .fb-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .fb-grid { grid-template-columns: 1fr; } }

.fb-card-feat {
  grid-column: span 2;
}
@media (max-width: 900px) { .fb-card-feat { grid-column: span 2; } }
@media (max-width: 560px) { .fb-card-feat { grid-column: span 1; } }

/* card styling */
.fb-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  display: flex; flex-direction: column;
  position: relative;
  transition: transform .22s, box-shadow .22s, border-color .22s;
  animation: fb-fade-up .4s ease both;
}
.fb-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 50px rgba(0,0,0,.6), 0 0 0 1px rgba(0,212,255,.12);
  border-color: var(--border-hov);
}
@keyframes fb-fade-up {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

.fb-card-img {
  position: relative; overflow: hidden;
  width: 100%; height: 188px; flex-shrink: 0;
  background: var(--ink-faint);
}
.fb-card-feat .fb-card-img { height: 280px; }
.fb-card-img img {
  width: 100%; height: 100%; object-fit: cover;
  opacity: .85; transition: transform .55s ease, opacity .22s;
}
.fb-card:hover .fb-card-img img { transform: scale(1.06); opacity: .95; }
.fb-card-img-fallback {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; color: var(--ink-faint);
  background: linear-gradient(145deg, #0b0f10, #06090a);
}
.fb-ribbon {
  position: absolute; top: 12px; left: 0;
  font-family: var(--font-head);
  font-size: 9px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase;
  padding: 3px 10px 3px 10px;
  background: var(--accent);
  color: #000;
  border-radius: 0 3px 3px 0;
  box-shadow: 3px 3px 10px rgba(0,0,0,.5);
  z-index: 2;
}
.fb-img-badge {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(6,9,10,.85); backdrop-filter: blur(4px);
  border: 1px solid var(--border);
  border-radius: 4px; padding: 3px 8px;
  font-family: var(--font-head);
  font-size: 9px; font-weight: 700; letter-spacing: .1em;
  color: var(--ink-mid);
  display: flex; align-items: center; gap: 4px;
}
.fb-img-badge::before { content: '▶'; font-size: 7px; color: var(--accent); }
.fb-play-ov {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.45); opacity: 0;
  transition: opacity .2s;
}
.fb-card:hover .fb-play-ov { opacity: 1; }
.fb-play-ring {
  width: 50px; height: 50px; border-radius: 50%;
  border: 2px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,212,255,.12);
  transform: scale(.85); transition: transform .2s;
}
.fb-card:hover .fb-play-ring { transform: scale(1); }

.fb-card-body {
  padding: 14px 16px 16px;
  display: flex; flex-direction: column; flex: 1;
}
.fb-card-meta {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.fb-card-date {
  font-size: 10px; color: var(--ink-dim); font-weight: 400;
  font-family: var(--font-head); letter-spacing: .06em;
}
.fb-card-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-faint); }
.fb-card-league-tag {
  font-family: var(--font-head); font-size: 9px;
  font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-dim);
}
.fb-card-title {
  font-family: var(--font-head);
  font-size: 17px; font-weight: 700;
  line-height: 1.2; letter-spacing: .01em;
  color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  transition: color .18s; flex: 1;
}
.fb-card:hover .fb-card-title { color: var(--accent); }
.fb-card-feat .fb-card-title { font-size: 22px; -webkit-line-clamp: 4; }

.fb-card-foot {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-top: 14px; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.fb-read-link {
  font-family: var(--font-head); font-size: 10px;
  font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--accent);
  display: flex; align-items: center; gap: 5px;
  transition: gap .18s;
}
.fb-read-link::after { content: '→'; }
.fb-card:hover .fb-read-link { gap: 9px; }
.fb-share-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--border); display: flex;
  align-items: center; justify-content: center;
  color: var(--ink-dim); transition: all .18s;
}
.fb-share-btn:hover { background: var(--accent-g); color: var(--accent); }

/* loading & empty */
.fb-loading, .fb-empty {
  grid-column: 1 / -1;
  text-align: center; padding: 60px 0;
  color: var(--ink-dim);
}
.fb-spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

.fb-load-more-wrap {
  margin-top: 36px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
.fb-load-more {
  padding: 12px 36px; border-radius: 6px;
  border: 1px solid rgba(0,212,255,.3);
  background: var(--accent-g);
  color: var(--accent);
  font-family: var(--font-head); font-size: 12px;
  font-weight: 700; letter-spacing: .15em;
  text-transform: uppercase;
  transition: all .22s;
}
.fb-load-more:hover {
  background: rgba(0,212,255,.28);
  box-shadow: 0 0 24px rgba(0,212,255,.15);
}
.fb-progress-bar {
  width: 180px; height: 2px;
  background: var(--border); border-radius: 2px; overflow: hidden;
}
.fb-progress-fill {
  height: 100%; background: var(--accent);
  transition: width .3s;
}
.fb-page-footer {
  border-top: 1px solid var(--border);
  padding: 18px 20px;
  max-width: 1280px; margin: 0 auto;
  display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap;
}
.fb-footer-brand {
  font-family: var(--font-head); font-size: 13px;
  font-weight: 800; text-transform: uppercase;
  color: var(--ink-mid);
}
.fb-footer-brand span { color: var(--accent); }

@media (max-width: 768px) {
  .fb-hero { flex-direction: column; align-items: flex-start; }
  .fb-search-wrap { display: none; }
  .fb-masthead-right { display: none; }
}
@media (max-width: 500px) {
  .fb-logo-text { font-size: 16px; }
  .fb-nav-tabs { display: none; }
  .fb-filter-bar { gap: 6px; }
}
</style>
</head>
<body>

<!-- header banner image (preserved from original) -->
<div class="separator" style="clear: both; max-width:1280px; margin:0 auto; padding:0 20px;">

<header class="fb-masthead">
  <div class="fb-masthead-inner">

  <div class="fb-hero">

      <div class="fb-hero-label">Live &amp; Latest</div>
      <div class="fb-hero-title">Football<br><span>Coverage</span></div>
      <div class="fb-hero-sub">Stream highlights, match reports &amp; news across all major leagues.</div>

      <svg class="fb-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

  </div>

<script>
(function() {
  const BLOG_URL = 'https://sports803livestream.blogspot.com';
  const MAX_RESULTS = 500;        // fetch up to 500 recent posts (enough for most blogs)
  const PAGE_SIZE = 9;            // cards per load

  // mapping for fancy ribbons (display short codes based on actual label names)
  const SHORT_MAP = {
    'Premier League': 'EPL',
    'EPL': 'EPL',
    'Serie A': 'ITA',
    'La Liga': 'ESP',
    'LaLiga': 'ESP',
    'Bundesliga': 'GER',
    'French League': 'L1',
    'Ligue 1': 'L1',
    'Champions League': 'UCL',
    'UCL': 'UCL',
    'Saudi Pro League': 'SPL',
    'Saudi League': 'SPL',
    'Championship': 'CHAMP',
    'Turkey': 'TUR',
    'Süper Lig': 'TUR',
    'World Cup': 'WC',
    'Football': '⚽'
  };

  let allPosts = [];          // raw posts from feed
  let filteredPosts = [];     // after label filter
  let sortedPosts = [];       // after sort
  let currentLabel = 'All';
  let currentSort = 'date-desc';
  let searchQuery = '';
  let displayedCount = 0;     // number of cards currently shown in grid

  // DOM elements
  const gridContainer = document.getElementById('fbGrid');
  const navTabsContainer = document.getElementById('fbNavTabs');
  const filterBarContainer = document.getElementById('fbFilterBar');
  const sortSelect = document.getElementById('fbSortSelect');
  const searchInput = document.getElementById('fbSearch');
  const countPill = document.getElementById('fbCountPill');
  const sectionLabelSpan = document.getElementById('fbSectionLabel');
  const loadMoreWrap = document.getElementById('fbLoadMoreWrap');
  const loadMoreBtn = document.getElementById('fbLoadMoreBtn');
  const loadProgress = document.getElementById('fbLoadProgress');
  const progressFill = document.getElementById('fbProgressFill');

  // Helper: escape HTML
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // Format date YYYY-MM-DD to readable
  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      let d = new Date(dateStr);
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch(e) { return dateStr.slice(0,10); }
  }

  // get short ribbon code
  function getShortCode(label) {
    if (SHORT_MAP[label]) return SHORT_MAP[label];
    // fallback: uppercase first letters
    return label.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,4);
  }

  // fetch all posts from Blogger (full feed, extract labels)
  async function fetchAllPosts() {
    const url = `${BLOG_URL}/feeds/posts/default?alt=json&max-results=${MAX_RESULTS}`;
    try {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      const entries = data.feed?.entry || [];
      const posts = [];
      for (let entry of entries) {
        // extract link
        let link = '';
        if (entry.link) {
          for (let l of entry.link) {
            if (l.rel === 'alternate') { link = l.href; break; }
          }
        }
        // extract image (thumbnail or from content)
        let image = null;
        if (entry.media$thumbnail) {
          image = entry.media$thumbnail.url.replace(/\/s\d+-c\//,'/s800-c/');
        } else if (entry.content && entry.content.$t) {
          const imgMatch = entry.content.$t.match(/<img[^>]+src=["']([^"']+)["']/i);
          if (imgMatch) image = imgMatch[1];
        }
        // extract categories (labels)
        const categories = [];
        if (entry.category) {
          entry.category.forEach(cat => {
            if (cat.term) categories.push(cat.term);
          });
        }
        // use first label as primary, but keep all for filter flexibility
        const primaryLabel = categories.length ? categories[0] : 'Football';
        const pubDate = entry.published?.$t ? entry.published.$t.slice(0,10) : '';
        posts.push({
          title: entry.title?.$t || 'Untitled',
          link: link,
          image: image,
          labels: categories,
          primaryLabel: primaryLabel,
          date: pubDate,
          rawDate: entry.published?.$t || ''
        });
      }
      // remove duplicates by link
      const unique = [];
      const seen = new Set();
      for (let p of posts) {
        if (!p.link || seen.has(p.link)) continue;
        seen.add(p.link);
        unique.push(p);
      }
      // sort by date desc (latest first)
      unique.sort((a,b) => (b.rawDate || '').localeCompare(a.rawDate || ''));
      return unique;
    } catch (err) {
      console.error('Blogger fetch error:', err);
      return [];
    }
  }

  // build dynamic filter UI from unique labels present in posts
  function buildFiltersFromPosts(posts) {
    const labelSet = new Set();
    for (let post of posts) {
      post.labels.forEach(lbl => labelSet.add(lbl));
    }
    const sortedLabels = Array.from(labelSet).sort((a,b) => a.localeCompare(b));
    // generate nav tabs + chips
    const allTab = { label: 'All', short: 'ALL' };
    const labelItems = [allTab, ...sortedLabels.map(lbl => ({ label: lbl, short: getShortCode(lbl) }))];

    // render nav tabs
    navTabsContainer.innerHTML = labelItems.map(item => `
      <button class="fb-nav-tab ${item.label === 'All' ? 'active' : ''}" data-label="${escapeHtml(item.label)}" onclick="window.fbSetFilter('${escapeHtml(item.label).replace(/'/g, "\\'")}')">
        ${item.label === 'All' ? 'All Matches' : escapeHtml(item.label)}
      </button>
    `).join('');

    // render filter chips (mobile friendly)
    filterBarContainer.innerHTML = `<span class="fb-filter-bar-label">Filter:</span>` + labelItems.map(item => `
      <button class="fb-chip ${item.label === 'All' ? 'active' : ''}" data-label="${escapeHtml(item.label)}" onclick="window.fbSetFilter('${escapeHtml(item.label).replace(/'/g, "\\'")}')">
        ${item.label === 'All' ? 'All' : escapeHtml(getShortCode(item.label))}
      </button>
    `).join('');
  }

  // apply label filter + search + sort and re-render first page
  function applyFiltersAndRender() {
    let temp = [...allPosts];
    // label filter
    if (currentLabel !== 'All') {
      temp = temp.filter(post => post.labels.includes(currentLabel));
    }
    // search filter
    if (searchQuery.trim() !== '') {
      const q = searchQuery.trim().toLowerCase();
      temp = temp.filter(post => post.title.toLowerCase().includes(q) || post.primaryLabel.toLowerCase().includes(q));
    }
    filteredPosts = temp;
    // apply sort
    if (currentSort === 'date-desc') {
      filteredPosts.sort((a,b) => (b.rawDate || '').localeCompare(a.rawDate || ''));
    } else if (currentSort === 'date-asc') {
      filteredPosts.sort((a,b) => (a.rawDate || '').localeCompare(b.rawDate || ''));
    } else if (currentSort === 'alpha') {
      filteredPosts.sort((a,b) => a.title.localeCompare(b.title));
    }
    sortedPosts = filteredPosts;
    displayedCount = 0;
    renderCurrentPage();
  }

  // render cards from sortedPosts starting from 0 up to PAGE_SIZE
  function renderCurrentPage() {
    if (!gridContainer) return;
    const total = sortedPosts.length;
    if (total === 0) {
      gridContainer.innerHTML = `<div class="fb-empty"><div class="fb-empty-icon">🏟️</div><div class="fb-empty-text">No posts match your selection.</div></div>`;
      loadMoreWrap.style.display = 'none';
      countPill.innerText = `0 posts`;
      sectionLabelSpan.innerText = currentLabel === 'All' ? 'All Posts' : currentLabel;
      return;
    }
    const nextBatch = sortedPosts.slice(0, PAGE_SIZE);
    displayedCount = nextBatch.length;
    // build HTML for cards
    const cardsHtml = nextBatch.map((post, idx) => generateCardHtml(post, idx === 0)).join('');
    gridContainer.innerHTML = cardsHtml;
    sectionLabelSpan.innerText = currentLabel === 'All' ? 'All Posts' : currentLabel;
    countPill.innerText = `${total} post${total !== 1 ? 's' : ''}`;
    updateLoadMoreUI(total);
  }

  // generate single card
  function generateCardHtml(post, isFeatured) {
    const imgHtml = post.image
      ? `<img src="${escapeHtml(post.image)}" alt="${escapeHtml(post.title)}" loading="lazy" onerror="this.onerror=null;this.parentElement.innerHTML='<div class=\'fb-card-img-fallback\'>⚽</div>'">`
      : `<div class="fb-card-img-fallback">⚽</div>`;
    const shortCode = getShortCode(post.primaryLabel);
    const ribbonColorAttr = `data-l="${escapeHtml(shortCode)}"`;
    return `<a href="${escapeHtml(post.link)}" class="fb-card ${isFeatured ? 'fb-card-feat' : ''}" target="_blank" rel="noopener noreferrer">
      <div class="fb-card-img">
        <div class="fb-ribbon" ${ribbonColorAttr}>${escapeHtml(shortCode)}</div>
        ${imgHtml}
        <div class="fb-img-badge">Watch</div>
        <div class="fb-play-ov"><div class="fb-play-ring"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="6 3 20 12 6 21 6 3"/></svg></div></div>
      </div>
      <div class="fb-card-body">
        <div class="fb-card-meta">
          <span class="fb-card-date">${formatDate(post.date)}</span>
          <span class="fb-card-dot"></span>
          <span class="fb-card-league-tag">${escapeHtml(post.primaryLabel)}</span>
        </div>
        <div class="fb-card-title">${escapeHtml(post.title)}</div>
        <div class="fb-card-foot">
          <span class="fb-read-link">Read more</span>
          <button class="fb-share-btn" onclick="fbSharePost(event, '${escapeHtml(post.link).replace(/'/g, "\\'")}', '${escapeHtml(post.title).replace(/'/g, "\\'")}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </button>
        </div>
      </div>
    </a>`;
  }

  // load more (increment displayed cards)
  function loadMorePosts() {
    if (displayedCount >= sortedPosts.length) return;
    const remaining = sortedPosts.slice(displayedCount, displayedCount + PAGE_SIZE);
    if (remaining.length === 0) return;
    const fragment = document.createDocumentFragment();
    remaining.forEach((post, idx) => {
      const cardDiv = document.createElement('div');
      cardDiv.innerHTML = generateCardHtml(post, false);
      fragment.appendChild(cardDiv.firstElementChild);
    });
    gridContainer.appendChild(fragment);
    displayedCount += remaining.length;
    updateLoadMoreUI(sortedPosts.length);
  }

  function updateLoadMoreUI(total) {
    if (total <= PAGE_SIZE) {
      loadMoreWrap.style.display = 'none';
      return;
    }
    loadMoreWrap.style.display = 'flex';
    const shown = displayedCount;
    loadProgress.innerText = `${shown} of ${total} posts shown`;
    const percent = (shown / total) * 100;
    progressFill.style.width = `${percent}%`;
    if (shown >= total) {
      loadMoreBtn.style.display = 'none';
    } else {
      loadMoreBtn.style.display = 'flex';
    }
  }

  // event handlers
  function setFilter(label) {
    currentLabel = label;
    // update active states
    document.querySelectorAll('.fb-nav-tab').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-label') === label);
    });
    document.querySelectorAll('.fb-chip').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-label') === label);
    });
    applyFiltersAndRender();
  }

  function setSort() {
    currentSort = sortSelect.value;
    applyFiltersAndRender();
  }

  function setSearch() {
    searchQuery = searchInput.value;
    applyFiltersAndRender();
  }

  // share helper
  window.fbSharePost = function(event, url, title) {
    event.preventDefault();
    event.stopPropagation();
    if (navigator.share) {
      navigator.share({ title: title, url: url }).catch(e => console.log);
    } else {
      navigator.clipboard && navigator.clipboard.writeText(url);
      alert("Link copied to clipboard!");
    }
  };

  window.fbSetFilter = setFilter;

  // initial load
  async function init() {
    gridContainer.innerHTML = '<div class="fb-loading"><div class="fb-spinner"></div> Loading latest posts from the blog...</div>';
    const posts = await fetchAllPosts();
    allPosts = posts;
    if (allPosts.length === 0) {
      gridContainer.innerHTML = '<div class="fb-empty"><div class="fb-empty-icon">⚠️</div><div class="fb-empty-text">Unable to fetch posts. Make sure blog is public and feed is accessible.</div></div>';
      countPill.innerText = '0';
      return;
    }
    buildFiltersFromPosts(allPosts);
    applyFiltersAndRender();
    // attach events
    sortSelect.addEventListener('change', setSort);
    searchInput.addEventListener('input', setSearch);
    loadMoreBtn.addEventListener('click', loadMorePosts);
  }

  init();
})();
</script>
</body>
</html>
