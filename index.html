body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--fb);
  min-height: 100vh;
}

/* ── WRAPPER ── */
#live-scores-widget {
  max-width: 560px;
  margin: 0 auto;
  padding: 0 0 24px;
}

/* ── HEADER ── */
.widget-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: rgba(8,8,8,.97);
  backdrop-filter: blur(14px);
  z-index: 10;
}
.widget-title {
  font-family: var(--fh);
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 9px;
}
.widget-live-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--red);
  font-family: var(--fh);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1.5px;
  padding: 4px 10px;
  border-radius: 20px;
  animation: blink 1.4s infinite;
}
.widget-refresh-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--mid);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: .15s;
  font-family: var(--fb);
}
.widget-refresh-btn:hover { border-color: var(--red); color: var(--text); }
.widget-refresh-btn.spinning .refresh-icon { animation: spin .7s linear; }

/* ── FILTER PILLS ── */
#filter-pills {
  display: flex;
  gap: 7px;
  padding: 10px 14px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}
#filter-pills::-webkit-scrollbar { display: none; }
.filter-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 13px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 30px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: .15s;
  font-family: var(--fb);
  color: var(--text);
}
.filter-pill:hover, .filter-pill.active {
  background: var(--red);
  border-color: var(--red);
  color: #fff;
}

/* ── COUNT BAR ── */
#count-bar {
  padding: 8px 16px;
  font-size: 11px;
  color: var(--dim);
  font-weight: 600;
  letter-spacing: .4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.refresh-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  margin-left: 5px;
  animation: blink 2s infinite;
  vertical-align: middle;
}

/* ── LEAGUE HEADER ── */
.lg-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg2);
  border-left: 3px solid var(--red);
  margin-top: 8px;
  font-family: var(--fh);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: .8px;
  color: var(--mid);
  text-transform: uppercase;
}
.lg-live-count {
  margin-left: auto;
  background: rgba(232,25,44,.15);
  color: var(--red);
  border: 1px solid rgba(232,25,44,.3);
  border-radius: 12px;
  font-size: 10px;
  padding: 2px 8px;
  font-weight: 800;
}

/* ── SCORE CARD ── */
.score-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin: 0 12px 8px;
  transition: .15s;
}
.score-card.live {
  border-color: rgba(232,25,44,.4);
  background: linear-gradient(160deg, #130404 0%, #111 100%);
  box-shadow: 0 0 0 1px rgba(232,25,44,.08), 0 4px 20px rgba(0,0,0,.4);
}
.score-card:hover { border-color: rgba(232,25,44,.3); }

.card-meta {
  font-size: 10px;
  color: var(--dim);
  font-weight: 700;
  letter-spacing: .9px;
  text-transform: uppercase;
  margin-bottom: 9px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.teams-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 8px;
}
.team {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.team.right {
  flex-direction: row-reverse;
  text-align: right;
}
.team-logo {
  width: 32px;
  height: 32px;
  object-fit: contain;
  flex-shrink: 0;
  border-radius: 4px;
}
.team-name {
  font-weight: 700;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.score-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
  min-width: 70px;
}
.score-nums {
  font-family: var(--fh);
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 3px;
  line-height: 1;
}
.score-status {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .8px;
  color: var(--dim);
}
.score-status.live {
  color: var(--red);
  animation: blink 1.4s infinite;
}
.live-indicator {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--red);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1px;
}
.live-dot {
  width: 7px; height: 7px;
  background: var(--red);
  border-radius: 50%;
  animation: blink 1s infinite;
  flex-shrink: 0;
}

/* ── ACTIONS ── */
.card-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.match-time-label {
  font-size: 11px;
  color: var(--dim);
  font-weight: 600;
}
.watch-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, var(--red), var(--red2));
  color: #fff;
  border: none;
  border-radius: 20px;
  font-family: var(--fh);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .5px;
  padding: 7px 16px;
  cursor: pointer;
  text-decoration: none;
  transition: transform .15s, box-shadow .15s;
}
.watch-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 18px rgba(232,25,44,.5);
}
.watch-btn:active { transform: scale(.97); }

/* ── SKELETON ── */
.skeleton {
  background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
  background-size: 200% auto;
  animation: shimmer 1.3s infinite;
  border-radius: 8px;
}
.skel-card {
  height: 96px;
  margin: 0 12px 8px;
  border-radius: var(--radius);
}

/* ── EMPTY / ERROR ── */
.state-box {
  text-align: center;
  padding: 44px 20px 32px;
  color: var(--dim);
}
.state-icon { font-size: 48px; margin-bottom: 12px; }
.state-title { font-size: 16px; font-weight: 700; color: var(--mid); margin-bottom: 6px; }
.state-sub   { font-size: 13px; }

/* ── FOOTER ── */
.widget-footer {
  text-align: center;
  padding: 14px;
  font-size: 11px;
  color: var(--dim);
  border-top: 1px solid var(--border);
  margin-top: 8px;
}
.widget-footer a { color: var(--red); text-decoration: none; font-weight: 700; }

/* ── KEYFRAMES ── */
@keyframes blink   { 0%,100%{opacity:1} 50%{opacity:.45} }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
@keyframes spin    { from{transform:rotate(0)} to{transform:rotate(360deg)} }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:2px; }
::-webkit-scrollbar-thumb:hover { background:var(--red); }

/* ── RESPONSIVE ── */
@media(max-width:400px) {
  .team-name { font-size:12px; }
  .score-nums { font-size:22px; }
  .score-center { min-width:60px; }
}

<body>

<div id="live-scores-widget">

  <!-- HEADER -->

  <div class="widget-header">
    <div class="widget-title">
      🔴 Live Scores
      <span class="widget-live-badge">● LIVE</span>
    </div>
    <button class="widget-refresh-btn" id="refresh-btn" onclick="triggerRefresh()">
      <span class="refresh-icon" id="refresh-icon">↻</span> Refresh
    </button>
  </div>

  <!-- FILTER PILLS -->

  <div id="filter-pills">
    <div class="filter-pill active" data-sport="all" onclick="setFilter('all')">🌍 All</div>
    <div class="filter-pill" data-sport="soccer"     onclick="setFilter('soccer')">⚽ Football</div>
    <div class="filter-pill" data-sport="basketball" onclick="setFilter('basketball')">🏀 NBA</div>
    <div class="filter-pill" data-sport="football"   onclick="setFilter('football')">🏈 NFL</div>
    <div class="filter-pill" data-sport="hockey"     onclick="setFilter('hockey')">🏒 NHL</div>
    <div class="filter-pill" data-sport="mma"        onclick="setFilter('mma')">🥊 MMA</div>
  </div>

  <!-- COUNT BAR -->

  <div id="count-bar">
    <span id="count-label">Loading…</span>
    <span>Auto-refresh 30s<span class="refresh-dot"></span></span>
  </div>

  <!-- CARDS CONTAINER -->

  <div id="cards-container"></div>

  <!-- FOOTER -->

  <div class="widget-footer">
    Powered by <a href="https://sports803livestream.blogspot.com" target="_blank">Sports 803</a>
    · Data via ESPN API
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// SPORTS 803 — LIVE SCORES WIDGET (Standalone)
// ══════════════════════════════════════════════════════════════════════════════

const WATCH_BASE = 'https://sports803livestream.blogspot.com/search?q=';
const REFRESH_MS = 30000;

// ─── SCALABLE LEAGUES — add here to show more ────────────────────────────────
const LEAGUES = [
  { sport:'soccer',     key:'eng.1',          name:'🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League',  short:'EPL',         emoji:'🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
  { sport:'soccer',     key:'eng.2',           name:'🏴󠁧󠁢󠁥󠁮󠁧󠁿 Championship',   short:'CHAMP',       emoji:'🏴󠁧󠁢󠁥󠁮󠁧󠁿' },
  { sport:'soccer',     key:'uefa.champions',  name:'⭐ Champions League', short:'UCL',         emoji:'⭐'  },
  { sport:'soccer',     key:'esp.1',           name:'🇪🇸 La Liga',         short:'LaLiga',      emoji:'🇪🇸' },
  { sport:'soccer',     key:'ita.1',           name:'🇮🇹 Serie A',          short:'SerieA',      emoji:'🇮🇹' },
  { sport:'soccer',     key:'ger.1',           name:'🇩🇪 Bundesliga',       short:'Bundesliga',  emoji:'🇩🇪' },
  { sport:'soccer',     key:'fra.1',           name:'🇫🇷 Ligue 1',          short:'Ligue 1',     emoji:'🇫🇷' },
  { sport:'soccer',     key:'usa.1',           name:'🇺🇸 MLS',              short:'MLS',         emoji:'🇺🇸' },
  { sport:'basketball', key:'nba',             name:'🏀 NBA',              short:'NBA',         emoji:'🏀' },
  { sport:'football',   key:'nfl',             name:'🏈 NFL',              short:'NFL',         emoji:'🏈' },
  { sport:'hockey',     key:'nhl',             name:'🏒 NHL',              short:'NHL',         emoji:'🏒' },
  { sport:'mma',        key:'ufc',             name:'🥊 UFC',              short:'UFC',         emoji:'🥊' },
];

// ─── STATE ───────────────────────────────────────────────────────────────────
let allData      = [];   // raw fetched results [{...lg, events:[...]}]
let activeFilter = 'all';
let isLoading    = false;

// ─── CACHE ───────────────────────────────────────────────────────────────────
const _cache  = new Map();
const TTL     = 25000;

async function fetchESPN(sport, key) {
  const ck  = sport + '/' + key;
  const now = Date.now();
  const hit = _cache.get(ck);
  if (hit && now - hit.ts < TTL) return hit.data;
  try {
    const r    = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sport}/${key}/scoreboard`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    _cache.set(ck, { data, ts: now });
    return data;
  } catch (e) {
    console.warn('[LiveScores]', ck, e.message);
    return hit ? hit.data : null;
  }
}

// ─── FETCH ALL ───────────────────────────────────────────────────────────────
async function fetchAll() {
  const results = await Promise.all(
    LEAGUES.map(lg =>
      fetchESPN(lg.sport, lg.key).then(data =>
        Object.assign({}, lg, { events: data ? (data.events || []) : [] })
      )
    )
  );
  return results;
}

// ─── WATCH URL ───────────────────────────────────────────────────────────────
function makeWatchUrl(ev) {
  const comp  = ev.competitions?.[0];
  const home  = comp?.competitors?.find(c => c.homeAway === 'home');
  const away  = comp?.competitors?.find(c => c.homeAway === 'away');
  const nameA = away?.team?.displayName || away?.team?.name || '';
  const nameB = home?.team?.displayName || home?.team?.name || '';
  return WATCH_BASE + encodeURIComponent(`${nameA} vs ${nameB}`);
}

// ─── FORMAT TIME ─────────────────────────────────────────────────────────────
function fmtTime(dateStr) {
  return new Date(dateStr).toLocaleTimeString('en', { hour:'2-digit', minute:'2-digit', hour12:true });
}

// ─── FILTER ──────────────────────────────────────────────────────────────────
function setFilter(sport) {
  activeFilter = sport;
  document.querySelectorAll('.filter-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.sport === sport);
  });
  render();
}
window.setFilter = setFilter;

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('cards-container');
  const countLbl  = document.getElementById('count-label');
  const frag      = document.createDocumentFragment();
  let   liveCount = 0;

  // Filter leagues by sport pill
  const filtered = activeFilter === 'all'
    ? allData
    : allData.filter(lg => lg.sport === activeFilter);

  filtered.forEach(lg => {
    // Only LIVE events
    const liveEvents = lg.events.filter(ev =>
      ev.competitions?.[0]?.status?.type?.state === 'in'
    );
    if (!liveEvents.length) return;

    // League header
    const lgHdr = document.createElement('div');
    lgHdr.className = 'lg-header';
    lgHdr.innerHTML = `${lg.name} <span class="lg-live-count">${liveEvents.length} LIVE</span>`;
    frag.appendChild(lgHdr);

    liveEvents.forEach(ev => {
      const comp   = ev.competitions?.[0];
      const home   = comp?.competitors?.find(c => c.homeAway === 'home');
      const away   = comp?.competitors?.find(c => c.homeAway === 'away');
      if (!home || !away) return;

      const status = comp?.status?.type;
      const detail = status?.detail || 'LIVE';

      const card = document.createElement('div');
      card.className = 'score-card live';

      card.innerHTML = `
        <div class="card-meta">
          <div class="live-indicator"><span class="live-dot"></span>${detail}</div>
        </div>
        <div class="teams-row">
          <div class="team">
            <img class="team-logo"
              src="${away.team?.logo || ''}"
              onerror="this.style.display='none'" alt="">
            <span class="team-name">${away.team?.shortDisplayName || away.team?.name || '?'}</span>
          </div>
          <div class="score-center">
            <div class="score-nums">${away.score ?? 0} – ${home.score ?? 0}</div>
          </div>
          <div class="team right">
            <img class="team-logo"
              src="${home.team?.logo || ''}"
              onerror="this.style.display='none'" alt="">
            <span class="team-name">${home.team?.shortDisplayName || home.team?.name || '?'}</span>
          </div>
        </div>
        <div class="card-actions">
          <span class="match-time-label">${ev.shortName || ''}</span>
          <a class="watch-btn" href="${makeWatchUrl(ev)}" target="_blank">▶ Watch Live</a>
        </div>`;

      frag.appendChild(card);
      liveCount++;
    });
  });

  container.innerHTML = '';

  if (!liveCount) {
    const box = document.createElement('div');
    box.className = 'state-box';
    box.innerHTML = `
      <div class="state-icon">📺</div>
      <div class="state-title">No live matches right now</div>
      <div class="state-sub">We'll auto-refresh every 30 seconds<span class="refresh-dot"></span></div>`;
    container.appendChild(box);
    countLbl.textContent = '0 matches live';
  } else {
    container.appendChild(frag);
    countLbl.textContent = liveCount + ' match' + (liveCount === 1 ? '' : 'es') + ' live now';
  }
}

// ─── LOAD ────────────────────────────────────────────────────────────────────
async function load(showSkeleton) {
  if (isLoading) return;
  isLoading = true;

  if (showSkeleton) {
    const container = document.getElementById('cards-container');
    container.innerHTML = Array(4)
      .fill('<div class="skeleton skel-card"></div>')
      .join('');
    document.getElementById('count-label').textContent = 'Loading…';
  }

  allData  = await fetchAll();
  isLoading = false;
  render();
}

// ─── MANUAL REFRESH ──────────────────────────────────────────────────────────
async function triggerRefresh() {
  const btn  = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.classList.add('spinning');
  icon.style.animation = 'spin .7s linear';
  // Invalidate cache for fresh data
  _cache.clear();
  await load(false);
  icon.style.animation = '';
  btn.classList.remove('spinning');
}
window.triggerRefresh = triggerRefresh;

// ─── AUTO-REFRESH ────────────────────────────────────────────────────────────
setInterval(async () => {
  await load(false);
}, REFRESH_MS);

// ─── BOOT ────────────────────────────────────────────────────────────────────
load(true);
</script>

</body>
</html>
